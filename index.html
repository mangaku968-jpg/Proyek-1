<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perangkat Pembelajaran — Bahasa Indonesia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ===================================================================
     VARIABEL WARNA & UKURAN GLOBAL
     Ubah warna di sini akan otomatis mengubah seluruh warna di website
     (karena semua elemen di bawah memanggil var(--nama-warna))
     =================================================================== */
  :root{
    --hijau-tua:#0F5A32;      /* warna sidebar & judul utama */
    --hijau:#0F7A3D;          /* warna tombol & aksen hijau */
    --hijau-muda:#E8F3EA;     /* warna latar label/tag hijau muda */
    --kuning:#F4C11B;         /* warna aksen kuning (tombol aktif, sorot) */
    --kuning-lembut:#FDF3D6;  /* warna latar lembut kuning */
    --merah:#E63946;          /* warna aksen merah (topik Teks Anekdot) */
    --tinta:#1F2937;          /* warna teks utama (hampir hitam) */
    --tinta-lembut:#5B6472;   /* warna teks sekunder/deskripsi */
    --kertas:#FFFCF5;         /* warna latar halaman (krem) */
    --kertas-kartu:#FFFFFF;   /* warna latar kartu (putih) */
    --garis:#E5DFC8;          /* warna garis pembatas/border */
    --radius:16px;            /* besar sudut melengkung kartu */
    --shadow: 0 1px 2px rgba(31,41,55,.04), 0 8px 24px rgba(15,90,50,.07); /* bayangan kartu */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--kertas);
    color:var(--tinta);
    line-height:1.6;
  }
  h1,h2,h3,.brand-word{font-family:'Fraunces',serif;}
  a{color:inherit;}
  ::selection{background:var(--kuning); color:var(--tinta);}
  :focus-visible{outline:3px solid var(--hijau); outline-offset:2px;}
  img,svg{max-width:100%; display:block;}

  .app{display:grid; grid-template-columns:272px 1fr; min-height:100vh;}
  @media (max-width:920px){.app{grid-template-columns:1fr;}}

  /* ===================================================================
     SIDEBAR (menu navigasi kiri, warna hijau tua)
     Berisi: logo, nama situs, menu Beranda/Tujuan/Materi/Tugas/Asesmen/Profil
     =================================================================== */
  .sidebar{
    background:var(--hijau-tua); color:#F2FBF4; padding:28px 22px 24px;
    position:sticky; top:0; height:100vh; overflow-y:auto;
    background-image:radial-gradient(circle at 85% 8%, rgba(244,193,27,.14), transparent 45%);
  }
  @media (max-width:920px){.sidebar{position:relative; height:auto;}}
  .brand{display:flex; align-items:center; gap:12px; margin-bottom:26px; padding-bottom:20px; border-bottom:1px solid rgba(255,255,255,.14);}
  .brand img{width:44px; height:44px; object-fit:contain; background:#fff; border-radius:10px; padding:4px;}
  .brand-word{font-size:1.08rem; font-weight:700; letter-spacing:.1px; line-height:1.2;}
  .brand-sub{font-size:.72rem; color:#BFE3CB; font-family:'Inter',sans-serif; margin-top:2px;}

  nav.menu{display:flex; flex-direction:column; gap:2px; margin-bottom:22px;}
  .menu-label{font-size:.68rem; text-transform:uppercase; letter-spacing:.11em; color:#8FCBA0; font-weight:600; margin:14px 4px 6px;}
  .menu-item{
    display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:10px;
    font-size:.92rem; color:#DFF4E5; cursor:pointer; border:none; background:transparent;
    text-align:left; width:100%; font-family:'Inter',sans-serif; transition:background .15s ease, color .15s ease;
  }
  .menu-item .ic{width:18px; text-align:center; flex-shrink:0; opacity:.85;}
  .menu-item:hover{background:rgba(255,255,255,.08);}
  .menu-item.active{background:var(--kuning); color:var(--hijau-tua); font-weight:600;}
  .menu-item.active .ic{opacity:1;}
  .sidebar-footer{margin-top:auto; padding-top:18px; border-top:1px solid rgba(255,255,255,.14); font-size:.74rem; color:#9FD4AC;}

  /* Submenu "Materi" di sidebar yang bisa dibuka/ditutup (expand/collapse),
     berisi pilihan "Teks Deskripsi" dan "Teks Anekdot" */
  .menu-parent{justify-content:space-between;}
  .menu-chev{margin-left:auto; font-size:.7rem; transition:transform .2s ease;} /* tanda panah ˅ yang berputar saat dibuka */
  .menu-parent.open .menu-chev{transform:rotate(180deg);}
  .submenu{display:none; flex-direction:column; gap:2px; padding-left:14px; margin-bottom:2px;}
  .submenu.open{display:flex;}
  .menu-item.sub{font-size:.87rem; padding:8px 12px; color:#C9E9D0;}
  .menu-item.sub.active{background:var(--kuning); color:var(--hijau-tua);}

  /* ===================================================================
     AREA KONTEN UTAMA (sebelah kanan sidebar)
     Berisi: kolom pencarian di atas (topbar), lalu isi tiap halaman
     =================================================================== */
  main{padding:0; min-width:0;}
  .topbar{
    position:sticky; top:0; z-index:5; background:rgba(255,252,245,.92); backdrop-filter:blur(6px);
    border-bottom:1px solid var(--garis); padding:16px 32px; display:flex; gap:16px; align-items:center;
  }
  .search-wrap{flex:1; max-width:560px; position:relative;}
  .search-wrap .ic{position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--tinta-lembut); pointer-events:none;}
  #searchInput{
    width:100%; padding:10px 14px 10px 38px; border-radius:999px; border:1.5px solid var(--garis);
    background:#fff; font-size:.92rem; font-family:'Inter',sans-serif; color:var(--tinta);
  }
  #searchInput:focus{border-color:var(--hijau);}
  .search-results{
    position:absolute; top:calc(100% + 8px); left:0; right:0; background:#fff; border:1px solid var(--garis);
    border-radius:12px; box-shadow:var(--shadow); max-height:360px; overflow-y:auto; display:none; z-index:10;
  }
  .search-results.show{display:block;}
  .search-results .sr-item{display:block; padding:11px 16px; border-bottom:1px solid var(--garis); cursor:pointer; font-size:.88rem;}
  .search-results .sr-item:last-child{border-bottom:none;}
  .search-results .sr-item:hover{background:var(--hijau-muda);}
  .search-results .sr-item .sr-page{font-size:.72rem; color:var(--hijau); font-weight:600; text-transform:uppercase; letter-spacing:.05em;}
  .search-empty{padding:14px 16px; font-size:.85rem; color:var(--tinta-lembut);}

  .content{padding:30px 32px 64px; max-width:1020px;}
  .page{display:none; animation:fadein .25s ease;}
  .page.active{display:block;}
  @keyframes fadein{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}

  .eyebrow{font-size:.74rem; text-transform:uppercase; letter-spacing:.12em; color:var(--hijau); font-weight:700; margin-bottom:8px;}
  .page h1{font-size:2.1rem; font-weight:700; margin:0 0 10px; color:var(--hijau-tua);}
  .page-lede{color:var(--tinta-lembut); font-size:1.02rem; max-width:680px; margin-bottom:30px;}

  /* ===================================================================
     KARTU (card) — dipakai berulang untuk Modul, Bahan Ajar, LKPD, dll.
     Struktur satu kartu: gambar SVG di atas (.card-img-wrap), lalu
     judul + deskripsi + tombol di bawah (.card-body)
     =================================================================== */
  .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:18px; margin-bottom:8px;}
  .grid.grid-2{grid-template-columns:repeat(2, minmax(280px,1fr));}
  @media (max-width:640px){.grid.grid-2{grid-template-columns:1fr;}}
  .card{
    background:var(--kertas-kartu); border:1px solid var(--garis); border-radius:var(--radius);
    box-shadow:var(--shadow); display:flex; flex-direction:column; overflow:hidden;
  }
  .card-img-wrap{width:100%; aspect-ratio:16/9; background:var(--hijau-muda); overflow:hidden;}
  .card-img-wrap svg{width:100%; height:100%;}
  .card-body{padding:18px 20px 20px; display:flex; flex-direction:column; gap:8px; flex:1;}
  .card .tag{
    font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--hijau-tua);
    background:var(--hijau-muda); display:inline-block; padding:3px 9px; border-radius:999px; width:fit-content;
  }
  .card h3{margin:2px 0 0; font-size:1.15rem; color:var(--tinta);}
  .card p{margin:0; font-size:.88rem; color:var(--tinta-lembut);}
  .card .card-foot{margin-top:auto; padding-top:14px;}

  .btn{
    display:inline-flex; align-items:center; gap:6px; background:var(--hijau); color:#fff; border:none;
    padding:9px 16px; border-radius:8px; font-size:.85rem; font-weight:600; cursor:pointer;
    text-decoration:none; font-family:'Inter',sans-serif;
  }
  .btn:hover{background:var(--hijau-tua);}
  .btn.ghost{background:transparent; color:var(--hijau-tua); border:1.5px solid var(--hijau);}
  .btn.ghost:hover{background:var(--hijau-muda);}
  .btn.kuning{background:var(--kuning); color:var(--hijau-tua);}
  .btn.kuning:hover{background:#e0ae12;}
  .btn.full{width:100%; justify-content:center;}

  .section-title{
    font-size:1.02rem; font-weight:700; color:var(--hijau-tua); margin:34px 0 14px;
    display:flex; align-items:center; gap:10px;
  }
  .section-title:first-of-type{margin-top:0;}
  .section-title::after{content:""; flex:1; height:1px; background:var(--garis);}

  /* Hero = kotak hijau besar berisi judul sambutan di halaman Beranda */
  .hero{
    background:linear-gradient(135deg, var(--hijau-tua), var(--hijau) 70%); border-radius:20px; padding:0;
    color:#fff; position:relative; overflow:hidden; margin-bottom:8px;
    display:grid; grid-template-columns:1.2fr 1fr; align-items:stretch;
  }
  @media (max-width:760px){.hero{grid-template-columns:1fr;}}
  .hero-text{padding:38px 34px;}
  .hero::before{content:""; position:absolute; right:-40px; top:-60px; width:220px; height:220px; background:radial-gradient(circle, rgba(244,193,27,.35), transparent 70%);}
  .hero .eyebrow{color:var(--kuning);}
  .hero h1{color:#fff; font-size:2.1rem; max-width:520px;}
  .hero p{color:#DFF4E5; max-width:480px; margin-bottom:22px;}
  .hero-actions{display:flex; gap:10px; flex-wrap:wrap;}
  .hero-art{position:relative; min-height:240px;}
  .hero-art svg{width:100%; height:100%; position:absolute; inset:0;}

  /* ===================================================================
     BERANDA GAYA BARU: topbar ungu + grid ikon bulat besar
     (meniru referensi Google Sites yang dikirim pengguna)
     =================================================================== */
  .beranda-topbar{
    display:flex; align-items:center; gap:14px;
    background:linear-gradient(90deg, #6A1B9A, #8E24AA);
    border-radius:16px; padding:16px 22px; color:#fff; margin-bottom:30px;
  }
  .beranda-topbar-logo img{width:38px; height:38px; object-fit:contain; background:#fff; border-radius:8px; padding:3px;}
  .beranda-topbar-title{font-family:'Fraunces',serif; font-weight:700; font-size:1.15rem;}
  .beranda-topbar-sub{font-size:.8rem; color:#EBD6F2; margin-top:2px;}

  /* Grid ikon bulat besar (tiap ikon = 1 menu; klik langsung pindah halaman) */
  .menu-grid{
    display:grid; grid-template-columns:repeat(5, minmax(110px,1fr)); gap:18px;
    margin-bottom:36px;
  }
  @media (max-width:760px){.menu-grid{grid-template-columns:repeat(3, 1fr);}}
  @media (max-width:480px){.menu-grid{grid-template-columns:repeat(2, 1fr);}}
  .menu-tile{
    all:unset; display:flex; flex-direction:column; align-items:center; gap:10px;
    cursor:pointer; text-align:center;
  }
  .menu-tile-icon{
    width:82px; height:82px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 16px rgba(0,0,0,.15); transition:transform .15s ease;
  }
  .menu-tile-icon svg{width:40px; height:40px;}
  .menu-tile:hover .menu-tile-icon{transform:translateY(-4px) scale(1.04);}
  .menu-tile-label{font-size:.85rem; font-weight:700; color:var(--tinta); text-transform:uppercase; letter-spacing:.03em;}

  /* Wrapper khusus ikon "Materi": menampung ikon + popup 2 pilihan topik */
  .menu-tile-wrap{position:relative; display:flex; flex-direction:column; align-items:center;}
  .menu-tile-popup{
    display:none; position:absolute; top:100%; left:50%; transform:translateX(-50%);
    margin-top:10px; background:#fff; border:1px solid var(--garis); border-radius:12px;
    box-shadow:var(--shadow); overflow:hidden; z-index:8; min-width:190px;
  }
  .menu-tile-popup.show{display:block;}
  .menu-tile-popup button{
    all:unset; display:flex; justify-content:space-between; align-items:center; gap:10px;
    width:100%; box-sizing:border-box; padding:11px 16px; font-size:.85rem; font-weight:600;
    color:var(--tinta); cursor:pointer; font-family:'Inter',sans-serif; border-bottom:1px solid var(--garis);
  }
  .menu-tile-popup button:last-child{border-bottom:none;}
  .menu-tile-popup button:hover{background:var(--hijau-muda);}
  .menu-tile-popup button span{font-size:.72rem; font-weight:600; color:var(--tinta-lembut); text-transform:none;}

  .stat-row{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin:28px 0 8px;}
  @media (max-width:600px){.stat-row{grid-template-columns:1fr;}}
  .stat{background:#fff; border:1px solid var(--garis); border-radius:12px; padding:16px 16px; text-align:left;}
  .stat b{display:block; font-family:'Fraunces',serif; font-size:1.5rem; color:var(--hijau-tua);}
  .stat span{font-size:.78rem; color:var(--tinta-lembut);}

  /* drive-row = kotak kecil abu-abu yang menampilkan nama file (misalnya
     "Modul_Teks_Deskripsi.pdf") sebelum tombol "Buka di Google Drive" */
  .drive-row{
    display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px;
    background:var(--kertas); border:1px solid var(--garis); font-size:.85rem;
  }
  .drive-row .ic{color:var(--hijau); flex-shrink:0;}

  /* Tombol tab (dipakai 3 tempat: pilih Teks Deskripsi/Anekdot di halaman
     Materi, dan pilih Formatif/Sumatif/Kisi-Kisi/Rubrik di halaman Tugas) */
  .tab-row{display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap;}
  .tab-btn{
    padding:8px 16px; border-radius:999px; border:1.5px solid var(--garis); background:#fff;
    font-size:.85rem; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; color:var(--tinta-lembut);
  }
  .tab-btn.active{background:var(--hijau-tua); color:#fff; border-color:var(--hijau-tua);}
  .tab-panel{display:none;} /* konten tab yang tidak sedang dipilih, disembunyikan */
  .tab-panel.active{display:block;}

  /* placeholder-box = kotak putus-putus untuk halaman yang belum ada isi
     (dipakai di bagian Video Pembelajaran) */
  .placeholder-box{
    border:1.5px dashed var(--garis); border-radius:var(--radius); padding:36px 28px;
    text-align:center; color:var(--tinta-lembut); background:#fff;
  }
  .placeholder-box svg{width:70px; height:70px; margin:0 auto 14px;}
  .placeholder-box h3{color:var(--tinta); margin:0 0 6px; font-size:1.05rem;}
  .placeholder-box p{margin:0; font-size:.88rem; max-width:380px; margin:0 auto;}

  /* Kartu Profil Guru: foto/inisial bulat + nama + NIM + logo kampus */
  .profil-card{
    display:flex; gap:22px; background:#fff; border:1px solid var(--garis); border-radius:var(--radius);
    padding:26px; box-shadow:var(--shadow); max-width:640px; align-items:center;
  }
  .profil-avatar{
    width:88px; height:88px; border-radius:50%; background:var(--hijau-muda); display:flex;
    align-items:center; justify-content:center; font-family:'Fraunces',serif; font-size:2rem; font-weight:700;
    color:var(--hijau-tua); flex-shrink:0; border:3px solid var(--kuning);
  }
  .profil-info h3{margin:0 0 2px; font-size:1.2rem;}
  .profil-info .nim{font-family:'JetBrains Mono',monospace; font-size:.82rem; color:var(--hijau); margin-bottom:8px;}
  .profil-info p{margin:0; font-size:.88rem; color:var(--tinta-lembut);}
  .profil-logo-row{display:flex; align-items:center; gap:14px; margin-top:18px; padding-top:18px; border-top:1px solid var(--garis);}
  .profil-logo-row img{width:52px; height:52px; object-fit:contain;}
  .profil-logo-row .plr-text{font-size:.82rem; color:var(--tinta-lembut);}
  .profil-logo-row .plr-text b{color:var(--tinta); display:block; font-size:.9rem;}

  mark{background:var(--kuning); padding:0 2px; border-radius:3px;}

  .mobile-topbar{display:none;}
  @media (max-width:920px){
    .mobile-topbar{display:flex; align-items:center; gap:10px; background:var(--hijau-tua); color:#fff; padding:14px 18px; position:sticky; top:0; z-index:20;}
    .mobile-topbar img{width:32px; height:32px; background:#fff; border-radius:8px; padding:2px;}
    .mobile-topbar button{margin-left:auto; all:unset; cursor:pointer; color:#fff; font-size:1.3rem; line-height:1;}
    .sidebar{display:none;}
    .sidebar.mobile-open{display:block; position:fixed; z-index:19; width:80%; max-width:300px; box-shadow:0 0 40px rgba(0,0,0,.3);}
  }
</style>
</head>
